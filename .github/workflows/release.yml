name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe / notes work

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      # Pure-Go (modernc sqlite, no CGO) → cross-compile every target from one host.
      # The version is stamped from the tag so the CLI / MCP / web UI all report it.
      - name: Cross-compile
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/RunOnYourOwn/track/internal/version.Version=${VERSION}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            out="track-${VERSION}-${GOOS}-${GOARCH}"
            echo "building ${out}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -trimpath -ldflags "${LDFLAGS}" -o "dist/${out}" .
          done
          ( cd dist && sha256sum track-* > checksums.txt )
          ls -l dist

      # Release notes come from the matching CHANGELOG.md section (single source of
      # truth); GitHub's auto-generated "What's Changed" is appended below it.
      - name: Extract changelog section
        id: notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            index($0, "## [" ver "]") == 1 { grab = 1; next }
            grab && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ -s RELEASE_NOTES.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
